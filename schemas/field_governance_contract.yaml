contract_name: field_governance_contract
contract_revision: '0.1'
dictionary_revision: 0.5.1
status: official
principles:
- 同名字段只有语义完全相同时才允许跨Domain复用。
- 来源字段不得因为字段名相似而直接提升为Canonical。
- 封闭枚举、受控代码集、开放代码、标识符和自由文本必须区分。
- 时间字段必须声明可比较的时间语义；未知时进入人工复核。
- 允许的上下文类型差异必须登记，禁止静默漂移。
- 破坏性字段变更必须新增字段并提供迁移计划。
value_domain_kinds:
  CLOSED_ENUM:
    description: 有限、封闭、版本化的枚举值集合。
    requires_ref: true
  CONTROLLED_CODESET:
    description: 交易所、币种、国家等外部或内部受控代码集。
    requires_ref: true
  OPEN_CODE:
    description: metric_code、node_code等允许持续扩展的代码。
    requires_ref: false
  IDENTIFIER:
    description: 证券代码、统一社会信用代码等身份标识。
    requires_ref: false
  FREE_TEXT:
    description: 不受固定值域约束的文本。
    requires_ref: false
time_semantics_catalog:
  event_time: 现实或市场事件实际发生时间。
  observation_time: 系统或来源观测到事实的时间。
  publication_time: 来源正式发布或披露时间。
  publication_date: 来源正式发布或披露日期。
  availability_time: 数据首次可用于决策的时间。
  effective_interval: 记录或关系的生效起止区间。
  trade_date: 交易所交易日，不代表采集或入库时间。
  report_period: 会计或统计报告期。
  system_time: 平台创建、更新或处理记录的系统时间。
