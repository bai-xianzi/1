shared_field_contracts:
- canonical_name: trade_count
  resolution: SEMANTIC_COLLISION_MIGRATION_REQUIRED
  variants:
  - domain_code: market_daily
    semantic_id: market_daily.trade_count
    meaning: 市场成交笔数
    data_type: LONG
    unit: count
  - domain_code: backtest
    semantic_id: backtest.executed_trade_count
    meaning: 策略实际交易笔数
    current_canonical_name: trade_count
    target_canonical_name: executed_trade_count
    data_type: INT
    unit: count
  migration:
    status: PLANNED
    breaking_change_allowed: false
    old_field_deprecation_required: true
    reference_scan_required: true
    golden_case_required: true
- canonical_name: value_numeric
  resolution: CONTEXTUAL_TYPE_VARIANT_ALLOWED
  variants:
  - domain_code: macro_policy
    data_type: DECIMAL
    numeric_role: reported_observation
  - domain_code: real_economy
    data_type: DECIMAL
    numeric_role: reported_observation
  - domain_code: simulation_value
    data_type: DOUBLE
    numeric_role: simulation_state
  - domain_code: scenario_intervention
    data_type: DOUBLE
    numeric_role: simulation_intervention
  rules:
  - DECIMAL与DOUBLE不得在同一Domain内静默互换。
  - 来源映射必须保留原始精度和转换证据。
  - 跨Domain连接时必须显式选择精度转换策略。
