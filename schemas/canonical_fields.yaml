dictionary_name: A股量化投资辅助操作系统统一字段字典
dictionary_revision: '0.5.1'
status: official_institutional_research_and_execution_governance
principles:
- 逻辑字段字典不等于一张超宽数据库表；按领域对象和事件扩展表实现。
- 外部来源字段只做映射，系统核心只使用canonical_name。
- 公开事实、合理推断和项目自定义必须分开记录。
- 原始层保留来源字段和值，标准层使用统一语义。
- 新增字段优先向后兼容；含义变化必须新建字段，禁止悄悄改定义。
- 所有可用于历史决策的数据必须具备available_at或可推导的可用时间。
- 标准字段字典不仅服务真实数据接入，也定义因果行情仿真的变量宇宙。
- 所有市场相关变量必须具备至少一种可激活方式：真实观测、人工输入、场景假设、代理估计、专家评估、因果推导、隐状态估计或合成生成。
- 结构字段不得任意随机；外生变量可输入或采样；内生变量优先由因果规则推导；行情输出只能在上游状态约束下生成。
- 大体牛熊、流动性和行业结构由因果链决定；随机性只用于参数不确定性与具体价格路径。
- 合成行情必须输出统一标准字段，并保留场景、因果、规则版本、生成器版本和随机种子。
- 所有影响市场的标准字段最终都应当被场景系统寻址，但直接控制权限由变量角色决定。
- 用户干预必须形成可审计合同，直接市场冲击必须与完整因果场景明确区分。
- 专家和大语言模型可以提出候选规则，但未经人工批准不得进入ACTIVE规则集。
- 当前simulation_variables.yaml为代表性样例，不代表全部字段已经完成仿真合同。
- 用户提出的现实场景先做领域抽象，不将每个自然语言例子机械新增为独立字段。
- 事件是否发生可用布尔门控表示，但影响类型、作用对象、影响程度、持续时间和恢复能力必须独立表达。
- 现实世界冲击统一建模为：通用实体、实体关系、通用事件、事件影响、暴露关系和因果规则。
- 支柱产业是国家与行业之间的结构关系；支柱产业受损是事件对行业产生的动态影响，两者不得混为一个字段。
- 仓库、工厂、港口等受损优先使用通用事件与影响模型，不为火灾、战争、洪水等每种组合创建专用字段。
- 项目所有者提出业务目标、约束、场景和验收要求；项目经理负责领域抽象、架构、字段命名、接口、开发顺序和技术取舍。
- 用户举出的自然语言例子属于需求说明，不自动等同于标准字段、表结构或代码实现。
- 事件是否发生可以使用布尔门控，但类型、作用对象、影响程度、持续时间、恢复周期和传播关系必须分别表达。
- 现实场景优先使用通用实体、实体关系、通用事件、事件影响、暴露关系和因果规则表达。
- 借鉴量化机构时学习研究生产线、实验治理、组合风险和可复现性，不照搬其硬件规模和组织复杂度。
- 借鉴券商时学习订单状态机、交易前风控、幂等、停机、账实核对、审计、环境隔离和回滚。
- 策略不得直接向券商通道发送订单；必须经过目标组合、订单生成和独立交易前风控。
- 研究结果必须经过登记、样本外、成本、容量、CWMS压力测试、模拟盘和有限实盘等晋级门槛。
- 失败和负面实验必须登记，防止选择性汇报和重复踩坑。
