contract_version: 1.0.0
task_id: TASK_016A
description: A股七类日线资金伪XLS（GB18030制表符文本）入库前合同。
source_format:
  actual_format: TAB_DELIMITED_TEXT
  file_extension: .xls
  encoding: gb18030
  delimiter: "\t"
  snapshot_date_source: parent_directory_YYYYMMDD
  missing_tokens:
  - ''
  - —
  - --
  - N/A
  - NA
  - 'null'
  - 'NULL'
  header_fingerprint: sha256(UTF8(unit_separator_join(stripped_headers)))
database_plan:
  database_uri: dfs://A_STOCK_DAILY_FUNDS_DB
  engine: TSDB
  physical_tables:
    security_snapshot: security_market_snapshot_raw
    classification_snapshot: classification_market_snapshot_raw
    money_flow_snapshot: money_flow_snapshot_raw
    ingest_batch: ingest_batch_log
    ingest_file: ingest_file_log
    quarantine_file: quarantine_file_log
  partitioning_intent: snapshot_month
  note: TASK_016A仅生成写入计划，不连接或修改DolphinDB。
