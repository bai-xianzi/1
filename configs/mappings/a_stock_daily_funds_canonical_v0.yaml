    quality_flags:
    - SUPPLEMENTAL_DAILY_BAR_NOT_AUTHORITATIVE
    - SOURCE_SNAPSHOT_TIME_UNAVAILABLE
    - VOLUME_LOT_TO_SHARE_DERIVED
    mappings:
    - target: instrument_id
      source: instrument_id
      transform: identity
      status: MAPPED
    - target: trade_date
      source: snapshot_date
      transform: identity
      status: MAPPED
