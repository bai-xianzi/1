task_id: TASK_017A
contract_name: A股七类日线资金Canonical接入合同
contract_version: 0.2.0
status: APPROVED_WITH_WARNINGS
dictionary_revision: 0.6.0
source:
  database_uri: dfs://A_STOCK_DAILY_FUNDS_DB
  main_raw_tables:
    security_snapshot: security_market_snapshot_raw
    classification_snapshot: classification_market_snapshot_raw
    money_flow_snapshot: money_flow_snapshot_raw
principles:
- Raw表只读，Canonical服务不得写回或修改Raw层。
- 不得把source_file_mtime_utc伪装成available_at或snapshot_time。
- 不得为集合竞价来源虚构09:25或其他精确时刻。
- hq只作为DailyBar补充与对账来源，不替代权威日K数据集。
- 分类节点市场快照不是ClassificationMembership。
- 来源额外字段必须保存在source_extensions和lineage。
- 所有百分比字段必须显式声明percent_points或ratio变换。
- zj流出字段保留来源负号，Canonical净额不得静默改符号。
- 日期级来源必须把精确时间留空，并通过snapshot_time_precision表达DATE_ONLY。
allowed_mapping_statuses:
- MAPPED
- MAPPED_WITH_WARNING
- DERIVED
- CONSTANT
- SOURCE_EXTENSION
- BLOCKED_SCHEMA_GAP
- NOT_APPLICABLE
